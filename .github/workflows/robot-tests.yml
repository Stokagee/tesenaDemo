name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Test URL - can be overridden by repository secrets
  # To set a secret: GitHub repo → Settings → Secrets and variables → Actions → New repository secret
  # Add secret named TEST_URL with your target URL (e.g., https://example.com)
  TEST_URL: ${{ secrets.TEST_URL || 'replaced in the GIT Actions' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python with cache
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Setup Node.js (required for Browser library)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 5. Initialize Browser library (Playwright)
      - name: Initialize Browser library
        run: rfbrowser init

      # 5b. Install Playwright system dependencies (required for Chromium on Ubuntu)
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      # 6. Run Robot Framework tests
      - name: Run Robot Framework tests
        run: robot --outputdir results --variable TEST_URL:${{ env.TEST_URL }} tests/

      # 7. Upload test artifacts (always, even on failure)
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: results/
          retention-days: 30

      # 8. Notifications (commented out - ready for future use)
